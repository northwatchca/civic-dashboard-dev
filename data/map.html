<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Provincial Map — Northwatch</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="data-style.css?v=2">
<style>
.map-controls{display:flex;align-items:center;gap:14px;margin-bottom:28px;flex-wrap:wrap;}
.map-controls label{font-size:13px;color:var(--text-dim);}
.metric-select{
  background:var(--bg-alt);color:var(--text);border:1px solid var(--line);
  border-radius:6px;padding:10px 14px;font-family:inherit;font-size:14px;
  min-width:280px;cursor:pointer;
}
.metric-select:focus{outline:none;border-color:var(--accent);}
.map-wrap{overflow-x:auto;margin-bottom:20px;}
.tile-map{display:block;margin:0 auto;}
.province-tile{cursor:pointer;}
.province-tile rect{transition:opacity .15s;}
.province-tile:hover rect{opacity:0.82;}

.map-legend{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:28px;}
.legend-block{}
.legend-gradient{width:180px;height:10px;border-radius:3px;}
.legend-labels{display:flex;justify-content:space-between;width:180px;margin-top:4px;font-size:11px;color:var(--text-dim);}
.legend-nodata{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-dim);margin-top:8px;}
.legend-nodata-swatch{width:14px;height:14px;border-radius:3px;background:#2c2a27;border:1px solid #3a3733;}
.legend-metric-label{font-size:12px;color:var(--text-dim);margin-bottom:6px;}

.map-tooltip{
  position:fixed;background:#232220;border:1px solid var(--line);
  border-radius:8px;padding:11px 14px;pointer-events:none;
  z-index:9999;display:none;min-width:170px;box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.tt-name{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:5px;}
.tt-val{font-size:18px;font-weight:600;color:var(--text);}
.tt-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}

.stat-panel{
  background:var(--bg-alt);border:1px solid var(--line);border-radius:10px;
  padding:22px 24px;display:none;
}
.stat-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.stat-panel-header h3{font-size:16px;margin:0;color:var(--accent);}
.stat-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:0;line-height:1;}
.stat-close:hover{color:var(--text);}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
.stat-item .s-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.4px;line-height:1.3;}
.stat-item .s-val{font-size:20px;font-weight:600;color:var(--text);margin-top:3px;}
.click-hint{font-size:12px;color:var(--text-dim);margin-bottom:16px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="breadcrumb"><a href="../index.html">Northwatch</a> / <a href="index.html">Data</a> / Provincial Map</div>
  <h1>Canada: Provincial Comparison Map</h1>
  <p class="page-sub">Select a metric to colour each province by performance. Hover for the value. Click any province to pin its full stat card.</p>

  <div class="map-controls">
    <label for="metric-select">Show:</label>
    <select class="metric-select" id="metric-select">
      <option value="GDP/Capita ($000s)">GDP per Capita ($000s)</option>
      <option value="Unemp Rate (%)">Unemployment Rate (%)</option>
      <option value="Avg Home Price ($000s)">Average Home Price ($000s)</option>
      <option value="Prov Net Debt ($B)">Provincial Net Debt ($B)</option>
      <option value="Debt/GDP (%)">Debt-to-GDP Ratio (%)</option>
      <option value="TFR 2024">Fertility Rate (TFR 2024)</option>
      <option value="Pop Growth (%)">Population Growth Rate (%)</option>
    </select>
  </div>

  <div class="map-wrap">
    <svg class="tile-map" id="tile-map" viewBox="0 0 856 316" width="856" height="316"></svg>
  </div>

  <div class="map-legend" id="map-legend">
    <div class="legend-block">
      <div class="legend-metric-label" id="legend-label"></div>
      <div class="legend-gradient" id="legend-gradient"></div>
      <div class="legend-labels"><span id="legend-lo"></span><span id="legend-hi"></span></div>
    </div>
    <div class="legend-nodata"><div class="legend-nodata-swatch"></div>Territories — no provincial data</div>
  </div>

  <p class="click-hint">Click any province to see its full profile below.</p>

  <div class="stat-panel" id="stat-panel">
    <div class="stat-panel-header">
      <h3 id="stat-name"></h3>
      <button class="stat-close" onclick="closePanel()">×</button>
    </div>
    <div class="stat-grid" id="stat-grid"></div>
  </div>

  <a class="nav-back" href="index.html">← Back to Data</a>
</div>

<div class="map-tooltip" id="map-tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-val" id="tt-val"></div>
  <div class="tt-sub" id="tt-sub"></div>
</div>

<script>
const PROV = {
  AB:{ name:"Alberta",            "GDP/Capita ($000s)":88.2, "Unemp Rate (%)":6.8,  "Avg Home Price ($000s)":498,  "Prov Net Debt ($B)":-12.8, "Debt/GDP (%)":-4.2,  "TFR 2024":1.82, "Pop Growth (%)":2.1 },
  SK:{ name:"Saskatchewan",       "GDP/Capita ($000s)":72.4, "Unemp Rate (%)":4.8,  "Avg Home Price ($000s)":352,  "Prov Net Debt ($B)":8.2,   "Debt/GDP (%)":7.1,   "TFR 2024":1.78, "Pop Growth (%)":1.4 },
  ON:{ name:"Ontario",            "GDP/Capita ($000s)":60.1, "Unemp Rate (%)":7.2,  "Avg Home Price ($000s)":982,  "Prov Net Debt ($B)":411.8, "Debt/GDP (%)":38.8,  "TFR 2024":1.31, "Pop Growth (%)":1.8 },
  BC:{ name:"British Columbia",   "GDP/Capita ($000s)":62.8, "Unemp Rate (%)":5.8,  "Avg Home Price ($000s)":1128, "Prov Net Debt ($B)":72.4,  "Debt/GDP (%)":16.2,  "TFR 2024":1.28, "Pop Growth (%)":1.5 },
  QC:{ name:"Quebec",             "GDP/Capita ($000s)":51.2, "Unemp Rate (%)":5.2,  "Avg Home Price ($000s)":498,  "Prov Net Debt ($B)":214.8, "Debt/GDP (%)":42.1,  "TFR 2024":1.48, "Pop Growth (%)":0.8 },
  MB:{ name:"Manitoba",           "GDP/Capita ($000s)":52.8, "Unemp Rate (%)":5.4,  "Avg Home Price ($000s)":358,  "Prov Net Debt ($B)":25.8,  "Debt/GDP (%)":18.4,  "TFR 2024":1.65, "Pop Growth (%)":1.1 },
  NS:{ name:"Nova Scotia",        "GDP/Capita ($000s)":44.1, "Unemp Rate (%)":7.8,  "Avg Home Price ($000s)":398,  "Prov Net Debt ($B)":16.2,  "Debt/GDP (%)":28.8,  "TFR 2024":1.38, "Pop Growth (%)":1.4 },
  NB:{ name:"New Brunswick",      "GDP/Capita ($000s)":42.8, "Unemp Rate (%)":7.4,  "Avg Home Price ($000s)":298,  "Prov Net Debt ($B)":14.8,  "Debt/GDP (%)":28.2,  "TFR 2024":1.35, "Pop Growth (%)":1.2 },
  NL:{ name:"Newfoundland & Lab.","GDP/Capita ($000s)":52.1, "Unemp Rate (%)":9.8,  "Avg Home Price ($000s)":298,  "Prov Net Debt ($B)":14.8,  "Debt/GDP (%)":30.4,  "TFR 2024":1.32, "Pop Growth (%)":0.2 },
  PE:{ name:"P.E.I.",             "GDP/Capita ($000s)":42.1, "Unemp Rate (%)":7.2,  "Avg Home Price ($000s)":348,  "Prov Net Debt ($B)":2.8,   "Debt/GDP (%)":18.8,  "TFR 2024":1.41, "Pop Growth (%)":2.8 },
  YT:{ name:"Yukon",              noData:true },
  NT:{ name:"N.W. Territories",   noData:true },
  NU:{ name:"Nunavut",            noData:true }
};

const METRICS = {
  "GDP/Capita ($000s)":     { label:"GDP per Capita ($000s)",    better:"higher", fmt:v=>`$${v}K` },
  "Unemp Rate (%)":         { label:"Unemployment Rate (%)",      better:"lower",  fmt:v=>`${v}%` },
  "Avg Home Price ($000s)": { label:"Avg Home Price ($000s)",     better:"lower",  fmt:v=>`$${v}K` },
  "Prov Net Debt ($B)":     { label:"Provincial Net Debt ($B)",   better:"lower",  fmt:v=>`$${v}B` },
  "Debt/GDP (%)":           { label:"Debt-to-GDP Ratio (%)",      better:"lower",  fmt:v=>`${v}%` },
  "TFR 2024":               { label:"Fertility Rate (TFR 2024)",  better:"higher", fmt:v=>v.toFixed(2) },
  "Pop Growth (%)":         { label:"Population Growth Rate (%)", better:"higher", fmt:v=>`${v}%` }
};

// Grid positions [col, row]
const GRID = {
  YT:[0,0], NT:[1,0],                   NU:[3,0],
  BC:[0,1], AB:[1,1], SK:[2,1], MB:[3,1], ON:[4,1], QC:[5,1],           NL:[7,1],
                                           NB:[4,2], NS:[5,2],
                                                     PE:[5,3]
};

const TW=96, TH=68, GX=10, GY=10;

// Color helpers
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lerp(a,b,t){return Math.round(a+(b-a)*t);}
function tri(c1,c2,c3,t){
  const[r1,g1,b1]=h2r(c1),[r2,g2,b2]=h2r(c2),[r3,g3,b3]=h2r(c3);
  if(t<=0.5){const s=t*2;return`rgb(${lerp(r1,r2,s)},${lerp(g1,g2,s)},${lerp(b1,b2,s)})`;}
  const s=(t-0.5)*2;return`rgb(${lerp(r2,r3,s)},${lerp(g2,g3,s)},${lerp(b2,b3,s)})`;
}
const BAD="#a87c7c",MID="#c9a44c",GOOD="#8ba888",NONE="#252320";

function getColor(val,min,max,better){
  if(val==null)return NONE;
  const t=max===min?0.5:(val-min)/(max-min);
  return better==="higher"?tri(BAD,MID,GOOD,t):tri(GOOD,MID,BAD,t);
}

function svgEl(tag,attrs){
  const el=document.createElementNS("http://www.w3.org/2000/svg",tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}
function svgText(x,y,txt,attrs){
  const el=svgEl("text",{x,y,"text-anchor":"middle",...attrs});
  el.textContent=txt; return el;
}

function buildMap(mKey){
  const cfg=METRICS[mKey];
  const svg=document.getElementById("tile-map");
  svg.innerHTML="";

  const vals=Object.values(PROV).filter(p=>!p.noData).map(p=>p[mKey]);
  const min=Math.min(...vals),max=Math.max(...vals);

  Object.entries(GRID).forEach(([code,[col,row]])=>{
    const p=PROV[code];
    const x=col*(TW+GX),y=row*(TH+GY);
    const val=p.noData?null:p[mKey];
    const fill=getColor(val,min,max,cfg.better);
    const tc=p.noData?"#444":"#f3f0e8";

    const g=svgEl("g",{"class":"province-tile","data-code":code});
    g.appendChild(svgEl("rect",{x,y,width:TW,height:TH,fill,rx:7}));
    g.appendChild(svgText(x+TW/2,y+22,code,{"font-size":17,"font-weight":700,fill:tc}));
    const shortName=p.name.length>15?p.name.slice(0,14)+"…":p.name;
    g.appendChild(svgText(x+TW/2,y+37,shortName,{"font-size":9.5,fill:tc,opacity:0.72}));
    g.appendChild(svgText(x+TW/2,y+54,p.noData?"—":cfg.fmt(val),{"font-size":11.5,"font-weight":600,fill:tc}));

    g.addEventListener("mouseenter",e=>showTip(e,code,val,cfg));
    g.addEventListener("mousemove",moveTip);
    g.addEventListener("mouseleave",hideTip);
    g.addEventListener("click",()=>showPanel(code));
    svg.appendChild(g);
  });

  updateLegend(mKey,min,max,cfg);
}

function showTip(e,code,val,cfg){
  const p=PROV[code];
  document.getElementById("tt-name").textContent=p.name;
  document.getElementById("tt-val").textContent=p.noData?"No data":cfg.fmt(val);
  document.getElementById("tt-sub").textContent=p.noData?"Territories excluded from provincial data":cfg.label;
  document.getElementById("map-tooltip").style.display="block";
  moveTip(e);
}
function moveTip(e){
  const tt=document.getElementById("map-tooltip");
  tt.style.left=(e.clientX+16)+"px";
  tt.style.top=(e.clientY-50)+"px";
}
function hideTip(){document.getElementById("map-tooltip").style.display="none";}

function showPanel(code){
  const p=PROV[code];
  if(p.noData)return;
  document.getElementById("stat-name").textContent=p.name+" — Full Profile";
  document.getElementById("stat-grid").innerHTML=Object.entries(METRICS).map(([k,cfg])=>`
    <div class="stat-item">
      <div class="s-label">${cfg.label}</div>
      <div class="s-val">${cfg.fmt(p[k])}</div>
    </div>`).join("");
  const panel=document.getElementById("stat-panel");
  panel.style.display="block";
  panel.scrollIntoView({behavior:"smooth",block:"nearest"});
}
function closePanel(){document.getElementById("stat-panel").style.display="none";}

function updateLegend(mKey,min,max,cfg){
  const g=cfg.better==="higher"
    ?`linear-gradient(to right,${BAD},${MID},${GOOD})`
    :`linear-gradient(to right,${GOOD},${MID},${BAD})`;
  document.getElementById("legend-gradient").style.background=g;
  document.getElementById("legend-label").textContent=cfg.label;
  document.getElementById("legend-lo").textContent=cfg.fmt(min);
  document.getElementById("legend-hi").textContent=cfg.fmt(max);
}

document.getElementById("metric-select").addEventListener("change",function(){buildMap(this.value);});
buildMap("GDP/Capita ($000s)");
</script>
<script src="../nav.js"></script>
</body>
</html>
