<body>
<div id="site-nav-root" style="height:53px;background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:500;"></div>
<div class="wrap">
  <div class="breadcrumb"><a href="../index.html">Northwatch</a> / <a href="index.html">Data</a> / Compare</div>
  <h1>Compare Charts</h1>
  <p class="page-sub">Pick any two indicators.</p>
  <p class="sync-status" id="sync-status"></p>

  <div class="compare-controls">
    <div class="compare-select-group">
      <label for="sel-a">Chart 1</label>
      <select id="sel-a"></select>
    </div>
    <div class="compare-select-group">
      <label for="sel-b">Chart 2</label>
      <select id="sel-b"></select>
    </div>
  </div>

  <div class="compare-grid">
    <div class="chart-card">
      <div class="chart-header no-toggle">
        <div class="chart-header-text">
          <h3><span id="title-a"></span><span class="cited-badge" id="badge-a" style="display:none" title="This chart has a real, citable external threshold — see 'What does this mean?'">Cited Threshold</span></h3>
          <p class="sub" id="sub-a"></p>
        </div>
        <div class="chart-header-actions">
          <button class="share-btn" id="share-a" title="Copy link to this chart">Share</button>
          <button class="csv-btn" id="csv-a" title="Download this chart's data as CSV">CSV</button>
          <button class="img-btn" id="img-a" title="Download this chart as a branded PNG image">Image</button>
          <button class="info-btn" id="info-a">What does this mean?</button>
        </div>
      </div>
      <div class="chart-body" style="display:block;">
        <div class="chart-box"><canvas id="chart-a" role="img"></canvas></div>
        <div id="sr-table-a"></div>
        <div class="src" id="src-a"></div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-header no-toggle">
        <div class="chart-header-text">
          <h3><span id="title-b"></span><span class="cited-badge" id="badge-b" style="display:none" title="This chart has a real, citable external threshold — see 'What does this mean?'">Cited Threshold</span></h3>
          <p class="sub" id="sub-b"></p>
        </div>
        <div class="chart-header-actions">
          <button class="share-btn" id="share-b" title="Copy link to this chart">Share</button>
          <button class="csv-btn" id="csv-b" title="Download this chart's data as CSV">CSV</button>
          <button class="img-btn" id="img-b" title="Download this chart as a branded PNG image">Image</button>
          <button class="info-btn" id="info-b">What does this mean?</button>
        </div>
      </div>
      <div class="chart-body" style="display:block;">
        <div class="chart-box"><canvas id="chart-b" role="img"></canvas></div>
        <div id="sr-table-b"></div>
        <div class="src" id="src-b"></div>
      </div>
    </div>
  </div>

  <a class="nav-back" href="index.html">&larr; Back to Data</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
